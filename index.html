<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>港股打新助手</title>
<style>
:root{--red:#e74c3c;--green:#27ae60;--orange:#f39c12;--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--gold:#f0c040}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang HK','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;padding-bottom:70px}
.app{max-width:900px;margin:0 auto;padding:12px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:8px}
.header h1{font-size:1.2em;color:#fff}
.header .update{color:var(--muted);font-size:0.7em}

/* Bottom Tab Bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;padding:4px 0 env(safe-area-inset-bottom,4px)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;cursor:pointer;color:var(--muted);font-size:0.68em;gap:2px;transition:all .2s;border:none;background:none}
.tab-item.active{color:var(--accent)}
.tab-item .icon{font-size:1.3em}
.tab-content{display:none}
.tab-content.active{display:block}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.card h3{color:#fff;margin-bottom:10px;font-size:0.95em}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* Stats row */
.stat-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat-chip{flex:1;min-width:60px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat-chip .v{font-size:1.3em;font-weight:700;color:#fff}
.stat-chip .l{color:var(--muted);font-size:0.7em;margin-top:2px}
.stat-chip.warn .v{color:var(--orange)}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:0.78em}
.tbl th{background:#21262d;color:#fff;padding:6px 8px;text-align:left;font-weight:600;white-space:nowrap;font-size:0.85em}
.tbl td{padding:6px 8px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:rgba(88,166,255,0.03)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}

/* Badges */
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:0.7em;font-weight:600}
.b-ah{background:rgba(88,166,255,0.2);color:var(--accent)} .b-inst{background:rgba(240,192,64,0.2);color:var(--gold)}
.b-zhuang{background:rgba(231,76,60,0.2);color:var(--red)} .b-cold{background:rgba(139,148,158,0.2);color:var(--muted)}
.b-sub{background:rgba(231,76,60,0.2);color:var(--red)} .b-wait{background:rgba(139,148,158,0.2);color:var(--muted)}
.b-done{background:rgba(39,174,96,0.2);color:var(--green)} .b-hot{background:rgba(231,76,60,0.2);color:var(--red)}
.b-mech{background:rgba(88,166,255,0.15);color:var(--accent);font-size:0.65em;padding:0 4px}
.sold-section{border-left:3px solid var(--green)}

/* Buttons & Inputs */
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--card);color:var(--text);font-weight:600;font-size:0.82em;transition:all .2s}
.btn:hover{background:#21262d;border-color:var(--accent)}
.btn-pri{background:rgba(88,166,255,0.15);border-color:var(--accent);color:var(--accent)}
.btn-pri:hover{background:rgba(88,166,255,0.25)}
.btn-danger{background:rgba(231,76,60,0.15);border-color:var(--red);color:var(--red)}
.btn-sm{padding:4px 8px;font-size:0.72em}
.btn-block{display:block;width:100%}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);width:100%;font-size:0.85em;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.form-group{margin-bottom:10px}
.form-group label{display:block;color:var(--muted);font-size:0.78em;margin-bottom:3px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Monthly Calendar */
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.month-header h2{font-size:1.1em;color:#fff}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:0.7em;text-align:center}
.month-grid .day-hdr{color:var(--muted);padding:4px;font-weight:600}
.month-grid .day{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px;min-height:50px;cursor:pointer;position:relative}
.month-grid .day:hover{border-color:var(--accent)}
.month-grid .day .dn{font-weight:600;margin-bottom:2px}
.month-grid .day.today{border-color:var(--accent);background:rgba(88,166,255,0.08)}
.month-grid .day .evt{font-size:0.65em;padding:0 2px;margin:1px 0;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evt-sub{background:rgba(231,76,60,0.2);color:var(--red)} .evt-end{background:rgba(243,156,18,0.2);color:var(--orange)}
.evt-list{background:rgba(240,192,64,0.2);color:var(--gold)} .evt-dark{background:rgba(139,148,158,0.2);color:var(--muted)}

/* Day detail list */
.day-list{margin-top:8px}
.stock-row{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer;font-size:0.82em}
.stock-row:hover{background:rgba(88,166,255,0.03)}
.stock-row .info{flex:1;min-width:0}
.stock-row .info .name{color:#fff;font-weight:600}
.stock-row .info .meta{color:var(--muted);font-size:0.78em}

/* Conflict warning */
.conflict-bar{background:rgba(243,156,18,0.1);border:1px solid rgba(243,156,18,0.3);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:0.78em}
.conflict-bar strong{color:var(--orange)}

/* Calculator */
.calc-stock{display:flex;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;gap:8px;cursor:pointer;font-size:0.82em;transition:all .2s}
.calc-stock.selected{border-color:var(--accent);background:rgba(88,166,255,0.06)}
.calc-stock .cb{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.7em}
.calc-stock.selected .cb{background:var(--accent);border-color:var(--accent);color:#fff}
.calc-stock .priority{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.65em;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* Webhook */
.webhook-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.webhook-chip{padding:6px 14px;border:1px solid var(--border);border-radius:16px;cursor:pointer;font-size:0.78em;color:var(--muted);transition:all .2s}
.webhook-chip:hover,.webhook-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,0.08)}

/* Toast */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-weight:600;z-index:200;font-size:0.85em}
.toast-success{background:rgba(39,174,96,0.9);color:#fff}
.toast-error{background:rgba(231,76,60,0.9);color:#fff}
.toast-info{background:rgba(88,166,255,0.9);color:#fff}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:700px;width:94%;max-height:85vh;overflow-y:auto}
.modal h3{color:#fff;margin-bottom:12px}

/* Toggle */
.toggle-wrap{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:2px}
.toggle-btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:0.78em;color:var(--muted);background:none}
.toggle-btn.active{background:var(--accent);color:#fff}

/* Section divider */
.section-title{color:var(--muted);font-size:0.72em;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;padding-left:4px}

@media(min-width:768px){.app{max-width:1000px}.month-grid .day{min-height:65px}.month-grid{font-size:0.82em}.modal{max-width:780px}}
</style>
</head>
<body>

<div class="app" id="app"></div>

<!-- Bottom Tab Bar -->
<div class="tab-bar">
  <button class="tab-item active" onclick="switchTab('list')"><span class="icon">📊</span>选股</button>
  <button class="tab-item" onclick="switchTab('subs')"><span class="icon">📝</span>申购</button>
  <button class="tab-item" onclick="switchTab('me')"><span class="icon">⚙️</span>我的</button>
</div>

<div id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalContent"></div></div>

<script>
// ==================== DATA ====================
let IPO_DATA = [];
async function loadIPOData() {
  try {
    const resp = await fetch('data.json');
    IPO_DATA = await resp.json();
loadIPOData();
  } catch(e) {
    console.error('加载数据失败，使用缓存:', e);
  }
// Also define hearing/listening pipeline data for toolbox
const PIPELINE = [{"name":"本末动力(北京)科技","date":"2026-06-29","stage":"通过聆讯"},{"name":"厦门瑞为信息技术","date":"2026-06-29","stage":"通过聆讯"},{"name":"上海哥瑞利软件","date":"2026-06-24","stage":"通过聆讯"},{"name":"广东鼎泰高科技术","date":"2026-06-24","stage":"通过聆讯"},{"name":"坦博尔集团","date":"2026-06-23","stage":"通过聆讯"},{"name":"普源精电","date":"2026-06-23","stage":"通过聆讯"},{"name":"立讯精密","date":"2026-06-24","stage":"通过聆讯"},{"name":"三环集团","date":"2026-06-23","stage":"通过聆讯"}];

// ==================== APP STATE ====================
let currentTab = localStorage.getItem('ipo_tab')||'list';
let calMonth = new Date(2026,5,30); // June 2026
let selectedDay = '2026-06-30';
let calViewMode = 'month'; // 'month' | 'gantt'

// 持久化：从 localStorage 恢复上次的选股状态
function loadCalcState(){
  try{ return JSON.parse(localStorage.getItem('ipo_calc_state')||'null'); }catch(e){ return null; }
}
function saveCalcState(){
  var state = {
    funds: calcFunds,
    tiers: stockTiers,
    selected: selectedCalcStocks
  };
  localStorage.setItem('ipo_calc_state', JSON.stringify(state));
}
var savedCalcState = loadCalcState();
let selectedCalcStocks = (savedCalcState && savedCalcState.selected) ? savedCalcState.selected : [];
let expandedCode = null; // 当前展开档位表的股票（每次只展开一只）
let stockPriority = {};
let webhookSettings = JSON.parse(localStorage.getItem('ipo_webhook')||'{}');
window.addEventListener("beforeunload",function(){saveCalcState()});
const today = new Date().toISOString().slice(0,10);

// ==================== INIT ====================
function render(){
  document.getElementById('app').innerHTML = renderTab(currentTab);
  updateTabBar();
}

function switchTab(tab){
  currentTab = tab;
  localStorage.setItem('ipo_tab', tab);
  // 申购页每次强制从 localStorage 重新加载
  render();
  window.scrollTo(0,0);
}

function updateTabBar(){
  document.querySelectorAll('.tab-item').forEach(b=>b.classList.remove('active'));
  const idx = ['list','subs','me'].indexOf(currentTab);
  if(idx>=0) document.querySelectorAll('.tab-item')[idx].classList.add('active');
}

// ==================== TAB 1: CALENDAR ====================
function renderTab(tab){
  if(tab==='list') return renderListTab();
  if(tab==='subs') return renderSubsTab();
  if(tab==='me') return renderMeTab();
  return '';
}

function renderCalendarTab(){
  const active = IPO_DATA.filter(s=>s.subEnd >= today);
  const subs = JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  const conflict = findConflicts();

  let html = '<div class="header"><h1>📊 港股打新助手</h1><span class="update" id="serverStatus" style="cursor:pointer" onclick="refreshFromServer()" title="点击从本地服务刷新">🔄 点击刷新最新数据</span></div>';

  // Stats
  html += `<div class="stat-row">
    <div class="stat-chip"><div class="v">${active.length}</div><div class="l">招股中</div></div>
    <div class="stat-chip warn"><div class="v">${conflict.conflictCount||active.length}</div><div class="l">资金冲突</div></div>
    <div class="stat-chip"><div class="v">${subs.length}</div><div class="l">我的申购</div></div>
    <div class="stat-chip"><div class="v">${conflict.groups.length}</div><div class="l">批次</div></div>
  </div>`;

  // Conflict warning
  conflict.groups.forEach(g=>{
    html += `<div class="conflict-bar">
      <strong>⚠️ ${g.stocks.length}只新股·相邻${g.span}天</strong><br>
      ${g.dates} 资金冲突，不能重复使用
      ${g.nextDate?`<br><span style="color:var(--green)">✅ ${g.releaseDate}资金解冻后，可接着打${g.nextDate}</span>`:''}
    </div>`;
  });

  // View toggle
  html += `<div class="flex-row" style="margin-bottom:10px">
    <div class="toggle-wrap">
      <button class="toggle-btn ${calViewMode==='month'?'active':''}" onclick="calViewMode='month';render()">📅 月历</button>
      <button class="toggle-btn ${calViewMode==='gantt'?'active':''}" onclick="calViewMode='gantt';render()">📊 甘特图</button>
    </div>
    <span style="flex:1"></span>
    <button class="btn btn-sm" onclick="switchTab('list')">🧮 计算器</button>
  </div>`;

  if(calViewMode==='month'){
    html += renderMonthCalendar();
    html += renderDayDetail();
  } else {
    html += renderGanttChart();
  }
  return html;
}

function renderMonthCalendar(){
  const y = calMonth.getFullYear(), m = calMonth.getMonth();
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();

  const events = {}; // day -> [{code, name, type: 'sub'|'end'|'list'|'dark'}]
  IPO_DATA.forEach(s=>{
    const ss = new Date(s.subStart), se = new Date(s.subEnd), ld = new Date(s.listDate);
    // Only show if in current month
    const days = [];
    for(let d=new Date(ss);d<=ld;d.setDate(d.getDate()+1)){
      if(d.getMonth()===m) days.push(d.getDate());
    }
    days.forEach(d=>{
      if(!events[d]) events[d]=[];
      const isSub = s.subStart.slice(8)==String(d).padStart(2,'0');
      const isEnd = s.subEnd.slice(8)==String(d).padStart(2,'0');
      const isList = s.listDate.slice(8)==String(d).padStart(2,'0');
      const label = (isList?'首·':isEnd?'止·':isSub?'招·':'')+s.name.slice(0,4);
      const cls = isList?'evt-list':isEnd?'evt-end':isSub?'evt-sub':'evt-dark';
      events[d].push({code:s.code,name:s.name,label,cls,isList,isEnd,isSub});
    });
  });

  let html = '<div class="card">';
  html += `<div class="month-header">
    <button class="btn btn-sm" onclick="calMonth.setMonth(calMonth.getMonth()-1);render()">◀</button>
    <h2>${y}年${m+1}月</h2>
    <button class="btn btn-sm" onclick="calMonth.setMonth(calMonth.getMonth()+1);render()">▶</button>
  </div>`;
  html += '<div class="month-grid">';
  ['日','一','二','三','四','五','六'].forEach(d=>html+=`<div class="day-hdr">${d}</div>`);

  // Previous month padding
  for(let i=firstDay-1;i>=0;i--){
    html+=`<div class="day" style="opacity:0.3"><div class="dn">${prevDays-i}</div></div>`;
  }
  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === today;
    const evts = events[d]||[];
    html+=`<div class="day${isToday?' today':''}" onclick="selectedDay='${ds}';render()">
      <div class="dn">${d}</div>`;
    evts.slice(0,3).forEach(e=>html+=`<div class="evt ${e.cls}" title="${e.name}">${e.label}</div>`);
    if(evts.length>3) html+=`<div style="font-size:0.6em;color:var(--muted)">+${evts.length-3}</div>`;
    html+='</div>';
  }
  // Next month padding
  const remaining = 7 - ((firstDay+daysInMonth)%7||7);
  if(remaining<7) for(let d=1;d<=remaining;d++) html+=`<div class="day" style="opacity:0.3"><div class="dn">${d}</div></div>`;

  html+='</div></div>';
  return html;
}

function renderDayDetail(){
  const dayStocks = IPO_DATA.filter(s=>{
    return s.subStart <= selectedDay && s.listDate >= selectedDay;
  });
  if(!dayStocks.length) return '<div class="card" style="text-align:center;color:var(--muted)">当天无新股事件</div>';

  const events = dayStocks.map(s=>{
    const isList = s.listDate===selectedDay, isEnd = s.subEnd===selectedDay, isSub = s.subStart===selectedDay;
    let status = isList?'🎉 上市':isEnd?'⏰ 截止':'📋 招股中';
    let statusCls = isList?'b-done':isEnd?'b-wait':'b-sub';
    return {...s, status, statusCls, isList, isEnd, isSub};
  });

  let html = `<div class="card"><h3>📌 ${selectedDay} 事项</h3>`;
  // Separate listing events
  const listings = events.filter(e=>e.isList);
  const others = events.filter(e=>!e.isList);
  if(listings.length){
    html += '<div style="color:var(--gold);margin-bottom:8px">🎉 今日挂牌</div>';
    listings.forEach(e=>html+=renderStockEventRow(e));
  }
  if(others.length){
    if(listings.length) html+='<div style="color:var(--muted);margin:8px 0">📋 招股中</div>';
    others.forEach(e=>html+=renderStockEventRow(e));
  }
  html+='</div>';
  return html;
}

function renderStockEventRow(s){
  const typeIcon = s.type==='ah'?'🔷':s.type==='inst'?'⭐':s.type==='zhuang'?'🦄':'';
  const isClosed = s.subEnd < today;
  return `<div class="stock-row" style="${isClosed?'background:rgba(240,192,64,0.15);':''}" onclick="showDetail('${s.code}')">
    <span class="badge ${s.statusCls}">${s.status}</span>
    ${typeIcon} <strong>${s.name}</strong> <code style="color:var(--muted)">${s.code}</code>
    <span class="badge b-mech">${s.mech||''}</span>
    <span style="flex:1"></span>
    <span style="font-size:0.78em;color:var(--muted)">${s.lot}股/手·${s.fee.toLocaleString()} HKD·${s.pubLots?((s.pubLots/1000).toFixed(0)+'K手'):''}·计息${s.interest||'?'}日</span>
  </div>`;
}

// 港股节假日（2026年）
const HK_HOLIDAYS = new Set([
  '2026-01-01','2026-02-17','2026-02-18','2026-02-19',
  '2026-04-03','2026-04-04','2026-04-06',
  '2026-05-01','2026-05-25',
  '2026-06-15',
  '2026-07-01',
  '2026-09-25',
  '2026-10-01','2026-10-19',
  '2026-12-25','2026-12-26',
]);
function parseYMD(d){ const p=d.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function formatYMD(dt){ return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function isHKHoliday(d){ return HK_HOLIDAYS.has(d) || parseYMD(d).getDay()%6===0; }
function nextBizDay(d){
  let nd=parseYMD(d); nd.setDate(nd.getDate()+1);
  while(isHKHoliday(formatYMD(nd))) nd.setDate(nd.getDate()+1);
  return formatYMD(nd);
}
function prevBizDay(d){
  let nd=parseYMD(d); nd.setDate(nd.getDate()-1);
  while(isHKHoliday(formatYMD(nd))) nd.setDate(nd.getDate()-1);
  return formatYMD(nd);
}

function renderGanttChart(){
  const stocks = IPO_DATA.filter(s=>s.subEnd>=today);
  if(!stocks.length) return '';
  let minD=stocks[0].subStart, maxD=stocks[0].listDate;
  stocks.forEach(s=>{ if(s.subStart<minD) minD=s.subStart; if(s.listDate>maxD) maxD=s.listDate; });
  const dates=[];
  let d=new Date(minD+'T00:00:00');
  const endD=new Date(maxD+'T00:00:00'); endD.setDate(endD.getDate()+2);
  while(d<=endD){ dates.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  const dateIdx={}; dates.forEach((dt,i)=>{ dateIdx[dt]=i; });

  let html = '<div class="card"><h3>📊 时间线</h3>';
  html += '<div style="display:flex;gap:12px;margin-bottom:6px;font-size:0.68em">';
  html += '<span><span style="display:inline-block;width:10px;height:10px;background:#e74c3c;border-radius:2px"></span> 申购期</span>';

const GROUP_COLORS = ['#58a6ff','#f0883e','#3fb950','#f0c040','#db61a2','#56d4dd','#f85149','#a371f7'];
function findConflicts(){
  const active = IPO_DATA.filter(s=>s.subEnd>=today);
  // 按截止日排序，相邻截止日差距≥2天即新组
  active.sort((a,b)=>a.subEnd.localeCompare(b.subEnd));
  const groups = [];
  let cur = null;
  active.forEach(s=>{
    if(!cur){
      cur = {stocks:[s], latestEnd:s.subEnd};
    } else {
      const lastEnd = new Date(cur.latestEnd);
      const sEnd = new Date(s.subEnd);
      const gapDays = Math.round((sEnd - lastEnd)/(1000*86400));
      if(gapDays <= 1){
        cur.stocks.push(s);
        if(s.subEnd > cur.latestEnd) cur.latestEnd = s.subEnd;
      } else {
        groups.push(cur);
        cur = {stocks:[s], latestEnd:s.subEnd};
      }
    }
  });
  if(cur) groups.push(cur);
  // 过滤掉只有1只的组
  const multiGroups = groups.filter(g=>g.stocks.length>1);
  // 分配颜色并打标记
  IPO_DATA.forEach(s=>{ s._groupId = -1; s._groupColor = ''; });
  multiGroups.forEach((g,gi)=>{
    g.color = GROUP_COLORS[gi % GROUP_COLORS.length];
    g.stocks.forEach(s=>{ s._groupId = gi; s._groupColor = g.color; });
  });
  // 格式化
  groups.forEach(g=>{
    g.label = g.stocks.map(s=>s.subEnd.slice(5)).join('·');
  });
  return {groups: multiGroups, allGroups: groups};
}

function getZhuangProb(s){
  // 庄股概率：高/中/低
  if(s.type==='zhuang') return '高';
  if(s.type==='inst' && s.cs<=2) return '中';
  if(s.type==='cold') return '低';
  return '低';
}
function getTypeLabel(s){
  if(s.type==='ah') return 'A+H';
  if(s.type==='inst') return '机构票';
  if(s.type==='zhuang') return '庄票';
  return '冷门';
}
function getExpLotsAndReturn(s){
  // 返回 {lots: 预期中签手数, ret: 预期收益}
  var tiers=stockTiers[s.code]||{};
  var totalLots=0, totalRet=0;
  ['A','B','C'].forEach(function(acc){
    var t=tiers[acc];
    if(t && s.margin && !isNaN(parseFloat(s.margin)) && parseFloat(s.margin)>0){
      var r=getAllocRate(s.code, t.lots, s.fee);
      totalLots+=t.lots*r;
      var gain=s.gain||'';
      var gainPct=0;
      var gm=gain.match(/[+-]?\d+/g);
      if(gm && gm.length>=2) gainPct=(parseFloat(gm[0])+parseFloat(gm[1]))/2/100;
      else if(gm && gm.length>=1) gainPct=parseFloat(gm[0])/100;
      totalRet+=t.lots*r*s.fee*gainPct;
    }
  });
  return {lots:totalLots, ret:totalRet};
}

function adjustDecision(s, expData){
  // 根据预期中签量调整决策
  var dec=s.dec||'';
  if(expData.lots<=0) return dec; // 没有孖展数据，保持原决策
  if(expData.lots<0.5 && dec.indexOf('放弃')<0 && dec.indexOf('妖股')<0){
    return '中签渺茫→一手/放弃';
  }
  if(expData.lots<2 && (dec.indexOf('重仓')>=0 || dec.indexOf('乙头')>=0)){
    return '中签偏低→降为适度';
  }
  return dec;
}

function getDecisionReason(s){
  var parts=[];
  // 类型标签
  parts.push(getTypeLabel(s));
  // 庄股概率
  var zp=getZhuangProb(s);
  if(zp==='高') parts.push('庄股概率高');
  else if(zp==='中') parts.push('庄股概率中');
  // 基石
  if(s.cs>=5) parts.push('基石'+(s.cornerstone||'').replace(/\([^)]*\)/,'').slice(0,15)+'强');
  else if(s.cs>=3) parts.push('基石'+(s.cornerstone||'').slice(0,12));
  else if(s.cs<=1) parts.push('无基石');
  // 热度
  if(s.hs>=5) parts.push('赛道极热');
  else if(s.hs>=3) parts.push('热度中等');
  else parts.push('赛道偏冷');
  // 绿鞋
  parts.push(s.gs?'✅绿鞋':'❌无绿鞋');
  // 特色
  var note=s.note||'';
  if(note.indexOf('18C')>=0) parts.push('18C');
  // 每手金额
  if(s.fee>=30000) parts.push('每手'+((s.fee||0)/1e4).toFixed(1)+'万·高价值');
  else if(s.fee>=10000) parts.push('每手'+(s.fee/1e4).toFixed(1)+'万');
  // 预期中签
  var expData=getExpLotsAndReturn(s);
  if(expData.lots>0){
    parts.push('中签≈'+expData.lots.toFixed(1)+'手');
    if(expData.ret>0) parts.push('收益≈'+(expData.ret/1e4).toFixed(1)+'万');
  }
  return parts.join('，');
}

function getDecisionScore(s){
  var score=0;
  if(s.cs>=6) score+=12; else if(s.cs>=5) score+=10; else if(s.cs>=4) score+=7; else if(s.cs>=3) score+=4; else if(s.cs>=2) score+=2;
  if(s.hs>=5) score+=9; else if(s.hs>=4) score+=6; else if(s.hs>=3) score+=3; else if(s.hs>=2) score+=1;
  if(s.type==='ah' && s.ahDisc){
    var disc=parseFloat(s.ahDisc)||0;
    if(disc<=-50) score+=6; else if(disc<=-40) score+=4; else if(disc<=-30) score+=2;
  }
  var expData=getExpLotsAndReturn(s);
  if(expData.lots>0){
    if(expData.lots>=10) score+=6;
    else if(expData.lots>=5) score+=4;
    else if(expData.lots>=2) score+=3;
    else if(expData.lots>=1) score+=1;
    else score-=5;
  }
  // 每手价值：高入场费=收益放大器，小涨幅也能赚大钱
  if(s.fee>=30000) score+=4;
  else if(s.fee>=10000) score+=2;
  else if(s.fee>=5000) score+=1;
  return score;
}

function renderDecisionPanel(){
  var all=IPO_DATA.filter(function(s){return s.subEnd>=today;});
  // 按截止日期排序
  all.sort(function(a,b){return a.subEnd.localeCompare(b.subEnd);});

      if(expData.ret>0) parts.push('收益≈'+(expData.ret/1e4).toFixed(1)+'万');
    }
    // 截止日期
    parts.push('<span style="color:var(--muted)">截止'+s.subEnd.slice(5)+'</span>');
    return parts.join(' · ');
  }

  var html='<div style="font-size:0.82em;line-height:2">';
  // AH 股
  if(ahStocks.length>0){
    html+='<div style="color:var(--accent);font-weight:700;margin-bottom:4px">🔷 AH 股 ('+ahStocks.length+'只)</div>';
    ahStocks.forEach(function(s){

  if(all.length===0) html+='<div style="color:var(--muted)">暂无招股中的新股</div>';

  return html;
}

const AB_GROUP = 5000000;
const COMMISSION = 50; // 券商佣金 50 HKD
const MAX_PRINCIPAL = 2000000; // 乙组本金上限200万

// 手动手数覆盖（localStorage读写）
function getManualLots(code){
  try{ return JSON.parse(localStorage.getItem('manual_lots_'+code)||'{}'); }catch(e){ return {}; }
}
function saveManualLot(code, label, lots){
  var m = getManualLots(code);
  if(lots === null || lots === undefined || lots < 0){ delete m[label]; }
  else { m[label] = lots; }
  localStorage.setItem('manual_lots_'+code, JSON.stringify(m));
}
function resetManualLots(code){
  localStorage.removeItem('manual_lots_'+code);
  render(); toast('✅ 手数已重置为自动计算','info');
}

// 招股书标准申购金额范围（HKD）
const JIA_BRACKETS = [
  {min:50000, max:100000, label:'5-10万'},
  {min:100000, max:200000, label:'10-20万'},
  {min:200000, max:400000, label:'20-40万'},
  {min:400000, max:800000, label:'40-80万'},
  {min:800000, max:1200000, label:'80-120万'},
  {min:1200000, max:2000000, label:'120-200万'},
  {min:2000000, max:3000000, label:'200-300万'},
  {min:3000000, max:4000000, label:'300-400万'},
  {min:4000000, max:5000000, label:'400-500万(甲尾)'},
];

const YI_BRACKETS = [
  {min:5000000, max:7000000, label:'乙头'},
  {min:7000000, max:10000000, label:'乙二'},
  {min:10000000, max:15000000, label:'乙三'},
  {min:15000000, max:20000000, label:'乙四'},
  {min:20000000, max:30000000, label:'乙五'},
  {min:30000000, max:40000000, label:'乙六'},
  {min:40000000, max:60000000, label:'乙七'},
];

function getFullTiers(fee, maxBudget, code){
  const manual = getManualLots(code);
  const stock = IPO_DATA.find(x=>x.code===code)||{};
  const yiTouLots = Math.ceil(AB_GROUP / fee);
  const yiTouAmt = yiTouLots * fee;

  // 甲组：优先用股票数据中的 jiaTiers（真实招股书手数数组），否则自动计算
  const jia = [];
  if(stock.jiaTiers && Array.isArray(stock.jiaTiers) && stock.jiaTiers.length > 0){
    // jiaTiers 是手数数组，按顺序对应各档位
    for(let i=0; i<stock.jiaTiers.length; i++){
      const b = JIA_BRACKETS[i];
      if(!b) break;
      var lots = (manual[b.label] !== undefined) ? manual[b.label] : stock.jiaTiers[i];
      if(lots < 1) continue;
      if(lots >= yiTouLots) break;
      const amt = lots * fee + COMMISSION;
      if(jia.length > 0 && jia[jia.length-1].lots === lots) continue;
      jia.push({label: b.label, lots, note: '≤'+(b.max/1e4).toFixed(0)+'万申购', amt, edited: manual[b.label]!==undefined});
    }
  } else {
    for(const b of JIA_BRACKETS){
      var lots = (manual[b.label] !== undefined) ? manual[b.label] : Math.floor(b.max / fee);
      if(lots < 1) continue;
      if(lots >= yiTouLots) break;
      const amt = lots * fee + COMMISSION;
      if(jia.length > 0 && jia[jia.length-1].lots === lots) continue;
      jia.push({label: b.label, lots, note: '≤'+(b.max/1e4).toFixed(0)+'万申购', amt, edited: manual[b.label]!==undefined});
    }
  }
  // 确保有甲尾
  const jiaTailLots = Math.floor((AB_GROUP - 1) / fee);
  if(jiaTailLots > 0 && jiaTailLots < yiTouLots && !jia.find(t=>t.lots===jiaTailLots)){
    var ml = (manual['甲尾'] !== undefined) ? manual['甲尾'] : jiaTailLots;
    jia.push({label:'甲尾', lots:ml, note:'≈'+(jiaTailLots*fee/1e4).toFixed(0)+'万', amt: ml*fee+COMMISSION, edited: manual['甲尾']!==undefined});
  }

  // 乙组：优先用股票数据中的 yiTiers（真实招股书申购金额万），否则用 YI_BRACKETS
  const yi = [];
  let prevLots = 0;
  const yiSource = (stock.yiTiers && Array.isArray(stock.yiTiers) && stock.yiTiers.length > 0) ? stock.yiTiers : null;
  if(yiSource){
    // yiTiers 是申购金额数组（万），如 [500, 600, 700, 800, 1000]
    const yiLabels = ['乙头','乙二','乙三','乙四','乙五','乙六','乙七','乙八','乙九','乙十'];
    for(let i=0; i<yiSource.length; i++){
      const amtWan = yiSource[i];
      const principal = (amtWan * 1e4) / 10;
      if(principal > MAX_PRINCIPAL) break;
      var lots = Math.ceil(amtWan * 1e4 / fee);
      if(lots <= prevLots) continue;
      if(lots < yiTouLots) continue;
      const label = yiLabels[i] || ('乙'+(i+1));
      // 手动覆盖
      if(manual[label] !== undefined) lots = manual[label];
      const amt = lots * fee + COMMISSION;
      yi.push({label, lots, note:'≈'+amtWan+'万', amt, edited: manual[label]!==undefined});
      prevLots = lots;
    }
  } else {
    // 无真实招股书档位数据：不计算假档位，只显示乙头基准参考
    const jiaTailLots2 = Math.floor((AB_GROUP - 1) / fee);
    if(jiaTailLots2 > 0){
      yi.push({label:'乙头(参考)', lots: yiTouLots, note:'⚠️ 缺招股书档位·仅乙头基准', amt: yiTouLots*fee+COMMISSION, edited: false});
    }
  }

  const isDefault = !localStorage.getItem('yi_tiers_'+code);
  return {jia, yi, yiTouLots, yiTouAmt, isDefault};
}

  html += '<div style="margin-left:28px;margin-bottom:10px;overflow-x:auto">';
  // 甲/乙组平均中签率
  var jiaRate=getAllocRate(s.code, 1, s.fee); // 1手一定在甲组
  var yiRate=getAllocRate(s.code, Math.ceil(AB_GROUP/s.fee), s.fee); // 乙头手数

    html+='<div style="margin-bottom:6px;font-size:0.75em">';

    html+='</div>';
  }
  html+='<table class="tbl" style="font-size:0.72em"><thead><tr><th>申购手数</th><th>申购金额</th><th>需本金</th>';
  ['A','B','C'].forEach(function(acc){ html+='<th>'+acc+' <span style="font-weight:normal;font-size:0.8em">余'+((funds[acc]-used[acc])/1e4).toFixed(0)+'万</span></th>'; });
  html+='</tr></thead><tbody>';

  if(s.allLots && s.allLots.length > 0){
    // Use actual prospectus data
    s.allLots.forEach(function(p){

      var cash=p.amt/10;
      var rowRate=getAllocRate(s.code, p.lots, s.fee);
      var row='<tr>';
      row+='<td class="num">'+p.lots.toLocaleString()+'</td>';
      row+='<td class="num">'+(p.amt/1e4).toFixed(0)+'万</td>';
      row+='<td class="num">'+(cash/1e4).toFixed(1)+'万</td>';
      ['A','B','C'].forEach(function(acc){
        var c=cur[acc]||{};
        var act=c.lots===p.lots;
        var remain=funds[acc]-used[acc];
        var over=cash>remain && !act;
        var btnLabel;
        if(act && rowRate>0){
          var el2=p.lots*rowRate;
          btnLabel='✓ →'+el2.toFixed(1)+'手';
        } else if(act){
          btnLabel='✓';
        } else if(over){
          btnLabel='超';
        } else if(rowRate>0){
          var el3=p.lots*rowRate;
          btnLabel='选('+el3.toFixed(1)+'手)';
        } else {
          btnLabel='选';
        }
        row+='<td><button class="btn btn-sm'+(act?' btn-pri':'')+(over?' btn-danger':'')+'" onclick="pickTier(\''+s.code+'\',\''+acc+'\',\'p'+p.lots+'\','+p.lots+')"'+(over?' disabled':'')+'>'+btnLabel+'</button></td>';
      });
      row+='</tr>';
      html+=row;
    });
  } else {
    // Fallback: calculated tiers
    var tiers=getFullTiers(fee, 1e12, s.code);
    var allTiers = tiers.jia.concat(tiers.yi);
    allTiers.forEach(function(t){ if((t.lots*fee+COMMISSION)/10<=MAX_PRINCIPAL) html+=addTierRow(s, t, fee, cur, funds, used); });
  }
  html+='</tbody></table>';
  // 预计中签行（按每档实际甲/乙组分别计算）
  var hasAnySel=false;
  ['A','B','C'].forEach(function(acc){ if(cur[acc]) hasAnySel=true; });

      }
    });
    html+=parts.join(' &nbsp;|&nbsp; ');
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function getAllocRate(code, lots, fee){
  // 返回中签率 (decimal)。甲组 vs 乙组分别计算。
  // lots * fee = 申购金额，≥500万为乙组，<500万为甲组
  var s=IPO_DATA.find(function(x){return x.code===code;});
  if(!s) return 0;
  var mv=(s.margin||'').toString();
  if(mv==='—'||mv===''||isNaN(parseFloat(mv))||parseFloat(mv)<=0) return 0;
  var m=parseFloat(mv);
  var totalRaise=(s.pubLots||0)*s.fee;
  var totalSub=m*totalRaise;
  var amt=(lots||0)*(fee||s.fee);
  var isYi=amt>=AB_GROUP; // AB_GROUP=5000000
  var raiseShare=totalRaise*0.5;
  var subShare=isYi?totalSub*0.75:totalSub*0.25;
  if(subShare<=0) return 0;
  var rate=raiseShare/subShare;
  if(s.mech==='18C') rate=rate*4;
  return Math.min(rate, 1);
}

function getTierAmounts(code){
  const s=IPO_DATA.find(function(x){return x.code===code;});
  const tiers=stockTiers[code]||{};
  const r={A:0,B:0,C:0};
  // 返回所需本金（总申购额/10）
  ['A','B','C'].forEach(function(acc){ const t=tiers[acc]; if(t) r[acc]=(t.lots*s.fee+COMMISSION)/10; });
  return r;
}

function commitLotEdit(input, code, label){
  var v = parseInt(input.value);
  if(isNaN(v) || v < 0) v = 0;
  saveManualLot(code, label, v);
  // 在弹窗中则刷新弹窗，否则刷新整个页面
  if(document.getElementById('modalOverlay').style.display==='flex'){
    showDetail(code);
  } else {
    render();

function addTierRow(s, t, fee, cur, funds, used){
  var amt=t.lots*fee+COMMISSION;
  var cash=amt/10;
  var rowRate=getAllocRate(s.code, t.lots, fee);
  var row='<tr>';
  row+='<td class="num">'+renderEditableLot(s.code, t.label, t.lots, t.edited)+'</td>';
  row+='<td class="num">'+(amt/1e4).toFixed(0)+'万</td>';
  row+='<td class="num">'+(cash/1e4).toFixed(1)+'万</td>';
  ['A','B','C'].forEach(function(acc){
    var c=cur[acc]||{};
    var act=c.label===t.label;
    var remain=funds[acc]-used[acc];
    var over=cash>remain && !act;
    var btnLabel;
    if(act && rowRate>0){
      btnLabel='✓ →'+(t.lots*rowRate).toFixed(1)+'手';
    } else if(act){
      btnLabel='✓';
    } else if(over){
      btnLabel='超';
    } else if(rowRate>0){
      btnLabel='选('+(t.lots*rowRate).toFixed(1)+'手)';
    } else {
      btnLabel='选';
    }
    row+='<td><button class="btn btn-sm'+(act?' btn-pri':'')+(over?' btn-danger':'')+'" data-code="'+s.code+'" data-acc="'+acc+'" data-label="'+t.label+'" data-lots="'+t.lots+'" onclick="selTier(this)"'+(over?' disabled':'')+'>'+btnLabel+'</button></td>';
  });
  row+='</tr>';
  return row;
}

function pickTier(code,acc,label,lots){
  var s=IPO_DATA.find(function(x){return x.code===code;});
  if(!stockTiers[code]) stockTiers[code]={};
  // 点击已选中的档位 → 取消选择
  var cur=stockTiers[code][acc];
  if(cur && cur.label===label){
    delete stockTiers[code][acc];
    if(Object.keys(stockTiers[code]).length===0) delete stockTiers[code];
  } else {
    stockTiers[code][acc]={label:label,lots:lots,fee:s.fee};
    if(selectedCalcStocks.indexOf(code)<0) selectedCalcStocks.push(code);
  }
  saveCalcState();
  // 就地更新该股票的档位表、底部合计和决策面板，不整页刷新
  updateTierTable(code);
  updateTotalsDisplay();
  var dp=document.getElementById('decisionPanel');
  if(dp) dp.innerHTML=renderDecisionPanel();
}
function selTier(btn){
  pickTier(btn.getAttribute('data-code'),btn.getAttribute('data-acc'),btn.getAttribute('data-label'),parseInt(btn.getAttribute('data-lots')));
}

function toggleCalcStock(code){
  if(expandedCode===code){
    expandedCode=null; // 仅收起，不取消勾选
  } else {
    expandedCode=code;
    if(selectedCalcStocks.indexOf(code)<0) selectedCalcStocks.push(code);
  }
  saveCalcState();
  render();
}
function removeCalcStock(code){
  const idx=selectedCalcStocks.indexOf(code);
  if(idx>=0) selectedCalcStocks.splice(idx,1);
  if(expandedCode===code) expandedCode=null;
  saveCalcState();
  render();
}

function updateTierTable(code){

  var s=IPO_DATA.find(function(x){return x.code===code;});
  if(!s) return;

function renderExpectedSummary(){
  var parts=[];
  ['A','B','C'].forEach(function(acc){
    var totalLots=0, totalAmt=0;
    selectedCalcStocks.forEach(function(code){
      var s=IPO_DATA.find(function(x){return x.code===code;});
      var tiers=stockTiers[code]||{};
      var t=tiers[acc];
      if(t && s){
        var rate=getAllocRate(code, t.lots, s.fee);
        if(rate>0){
          totalLots+=t.lots*rate;
          totalAmt+=t.lots*rate*s.fee;
        }
      }
    });
    if(totalLots>0){
      parts.push('<b style=\"color:var(--accent)\">'+acc+'</b> '+totalLots.toFixed(1)+'手 ≈'+(totalAmt/1e4).toFixed(1)+'万');
    }
  });
  return parts.length>0 ? parts.join(' &nbsp;|&nbsp; ') : '<span style=\"color:var(--muted)\">填写孖展倍数后自动计算</span>';
}



function deposit(acc){
  var amt=parseFloat(document.getElementById('depAmt'+acc).value)||0;
  if(!amt){ toast('请输入金额','error'); return; }
  calcFunds[acc]+=amt;
  saveCalcState();
  document.getElementById('fund'+acc).value=calcFunds[acc];
  document.getElementById('depAmt'+acc).value='';
  updateListRemaining();
  toast('账户'+acc+' 入金 '+amt.toLocaleString()+' HKD','success');
}
function withdraw(acc){
  var amt=parseFloat(document.getElementById('depAmt'+acc).value)||0;
  if(!amt){ toast('请输入金额','error'); return; }
  calcFunds[acc]-=amt;
  saveCalcState();
  document.getElementById('fund'+acc).value=calcFunds[acc];
  document.getElementById('depAmt'+acc).value='';
  updateListRemaining();
  toast('账户'+acc+' 出金 '+amt.toLocaleString()+' HKD','success');
}

}
function updateListFund(acc, val){

}
function updateListRemaining(){
  const f=getFrozenFunds(), h=getStockHolding();
  ['A','B','C'].forEach(function(acc){
    const el = document.getElementById('totalVal'+acc);
    if(!el) return;
    const fund = calcFunds[acc] || 0;
    const rem = fund + h[acc]*0.7;
    el.textContent = (rem/1e4).toFixed(2)+'万';
    el.style.color = rem < 0 ? 'var(--red)' : 'var(--green)';
  });
  const warnEl = document.getElementById('overBudgetWarn');
  if(warnEl){
    const hasOver = ['A','B','C'].some(function(k){
      const fund = calcFunds[k] || 0;
      return fund + h[k]*0.7 < 0;
    });
    warnEl.style.display = hasOver ? 'block' : 'none';
  }
}

function updateTotalsDisplay(){
  var totals={A:0,B:0,C:0};
  selectedCalcStocks.forEach(function(code){
    var ts=getTierAmounts(code);
    totals.A+=ts.A; totals.B+=ts.B; totals.C+=ts.C;
  });
  ['A','B','C'].forEach(function(acc){
    var el=document.getElementById('totalVal'+acc);
    if(el){
      var fund=acc==='A'?calcFunds.A:acc==='B'?calcFunds.B:calcFunds.C;
      var rem=fund-totals[acc];
      el.textContent=(rem/1e4).toFixed(2)+'万';
      el.style.color=rem<0?'var(--red)':'var(--green)';
    }
  });
  // 更新超出警告
  var warnEl=document.getElementById('overBudgetWarn');
  if(warnEl){
    var hasOver=totals.A>calcFunds.A||totals.B>calcFunds.B||totals.C>calcFunds.C;
    warnEl.style.display=hasOver?'block':'none';
  }
  // 更新表头总融资额
  var finEl=document.getElementById('totalFinAmt');
  if(finEl){
    var tfa=0;
    IPO_DATA.filter(function(s){return s.subEnd>=today;}).forEach(function(si){
      var mv=(si.margin||'').toString();
      if(mv&&mv!=='—'&&!isNaN(parseFloat(mv))&&parseFloat(mv)>0){
        tfa+=parseFloat(mv)*(si.pubLots||0)*si.fee;
      }
    });
    finEl.textContent='总融资额\n'+(tfa>0?(tfa/1e8).toFixed(1)+'亿':'—');
  }
  // 更新每只已选股票在列表中的账户标签
  selectedCalcStocks.forEach(function(code){
    updateStockRowLabels(code);
  });
}
function updateStockRowLabels(code){
  var cur=stockTiers[code]||{};
  var s=IPO_DATA.find(function(x){return x.code===code;});
  var getLabel=function(acc){
    var t=cur[acc];
    if(!t) return '—';
    var label=t.label+' '+t.lots+'手';
    var r=s?getAllocRate(code, t.lots, s.fee):0;
    if(r>0){
      var el=t.lots*r;
      label+=' <span style=\"font-size:0.85em;color:var(--gold)\">→'+el.toFixed(1)+'手</span>';
    }
    return label;
  };
  // 更新主表格中该股票行的 A/B/C 列（通过遍历所有单元格找对应行）
  var table=document.querySelector('.tbl');
  if(!table) return;
  var rows=table.querySelectorAll('tr');
  for(var i=0;i<rows.length;i++){
    var row=rows[i];
    var codeCell=row.querySelector('code');
    if(codeCell && codeCell.textContent===code){
      var cells=row.querySelectorAll('td');
      // 单元格分布: 选 | 代码 | 名称 | 机制 | 入场费 | 截止 | 上市 | 公开手数 | 基石 | 孖展 | A | B | C
      // A=倒数第三个，B=倒数第二个，C=最后一个
      if(cells.length>=3){
        cells[cells.length-3].innerHTML='<span style="font-size:0.72em;color:'+(cur['A']?'var(--accent)':'var(--muted)')+'">'+getLabel('A')+'</span>';
        cells[cells.length-2].innerHTML='<span style="font-size:0.72em;color:'+(cur['B']?'var(--accent)':'var(--muted)')+'">'+getLabel('B')+'</span>';
        cells[cells.length-1].innerHTML='<span style="font-size:0.72em;color:'+(cur['C']?'var(--accent)':'var(--muted)')+'">'+getLabel('C')+'</span>';
      }
      break;
    }
  }
}

// 一键保存到申购（增量更新，不覆盖申购页面已做的修改）
function saveAllToSubscriptions(){
  let subs = JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  let added = 0, updated = 0;
  const selectedKeys = new Set();

  selectedCalcStocks.forEach(function(code){
    const s=IPO_DATA.find(function(x){return x.code===code;});
    const tiers=stockTiers[code]||{};
    ['A','B','C'].forEach(function(acc){
      const t=tiers[acc]; if(!t) return;
      const accName='账户'+acc;
      const frozen=t.lots*s.fee+COMMISSION;
      const tierLabel = t.lots+'手 ('+(t.lots*s.fee/1e4).toFixed(0)+'万)';
      selectedKeys.add(code+'_'+accName);

      // 查找同股票+同账户的已有记录
      const existing = subs.find(function(x){
        return x.code===code && x.account===accName;
      });

      if(existing){
        // 更新档位/金额，调整冻结差额（退款旧冻结，扣除新冻结）
        var oldFrozSub=existing.frozen;
        existing.tier = tierLabel;
        existing.lots = t.lots;
        existing.amount = t.lots*s.fee;
        existing.frozen = frozen;
        existing.fee = s.fee;
        existing.lot = s.lot;
        existing.subEnd = s.subEnd;
        existing.listDate = s.listDate;
        calcFunds[acc] += oldFrozSub - frozen;
        updated++;
      } else {
        // 新建：申购扣减冻结金
        calcFunds[acc] -= frozen;
        subs.push({
          id: Date.now().toString()+'_'+code+'_'+acc,
          code, name:s.name, type:s.type,
          account: accName,
          tier: tierLabel, lots: t.lots,
          amount: t.lots*s.fee,
          frozen,
          subEnd: s.subEnd, listDate: s.listDate,
          fee: s.fee, lot: s.lot,
          sellPrice:null, sellDate:null
        });
        added++;
      }
    });
  });

  // 删除不再选中的记录（但保护有中签或已卖出的），退款被删记录的冻结金
  let deletedKeys = new Set(JSON.parse(localStorage.getItem('ipo_subs_deleted')||'[]'));
  subs = subs.filter(function(x){
    const key = x.code+'_'+x.account;
    if(deletedKeys.has(key) && selectedKeys.has(key)){
      deletedKeys.delete(key);
    }
    if(deletedKeys.has(key)) return false;
    if(x.sellPrice) return true;
    if(x.alot!=null) return true;
    if(selectedKeys.has(key)) return true;
    // 不在选中列表中 → 删除，退还冻结金
    const accK=x.account==='账户A'?'A':x.account==='账户B'?'B':'C';
    calcFunds[accK] += x.frozen;
    return false;
  });
  localStorage.setItem('ipo_subs_deleted',JSON.stringify([...deletedKeys]));

  localStorage.setItem('ipo_subs',JSON.stringify(subs));
  // 保存后清空计算器选择，避免与申购记录重复计算
  selectedCalcStocks = [];
  saveCalcState();
  const savedNames = [...new Set(subs.filter(x=>!x.sellPrice).map(x=>x.name))];
  switchTab('subs');
  toast('✅ 新增 '+added+' 条, 更新 '+updated+' 条 ('+savedNames.length+'只)：'+savedNames.join('、'),'success');
}

// 暂存编辑：{id: {alot, sellPrice, sellDate}}
let pendingEdits = {};
function hasPending(){ return Object.keys(pendingEdits).length>0; }
function getEff(s, field){
  if(pendingEdits[s.id]&&pendingEdits[s.id][field]!==undefined) return pendingEdits[s.id][field];
  return s[field];
}
function setPending(id, field, value){
  if(!pendingEdits[id]) pendingEdits[id]={};
  var subs2=JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  var s2=subs2.find(function(x){return x.id===id;});
  if(!s2){ pendingEdits[id][field]=value; return; }
  var accKey2=s2.account==='账户A'?'A':s2.account==='账户B'?'B':'C';
  // 中签变更 → 退款 = 冻结金额 - 实际成本（中签0=全额退款）
  if(field==='alot'){
    var oldAlotEff=getEff(s2,'alot');
    var newAlot=value;
    var oldCost=(oldAlotEff!=null)?(oldAlotEff===0?0:oldAlotEff*s2.fee+COMMISSION):s2.frozen;
    var newCost=(newAlot!=null)?(newAlot===0?0:newAlot*s2.fee+COMMISSION):s2.frozen;
    calcFunds[accKey2] += oldCost - newCost;
    saveCalcState();
    updateListRemaining();
  }
  // 卖出价变更 → 实时同步账户资金（卖出回款）
  if(field==='sellPrice'){
    var oldEff=getEff(s2,'sellPrice');
    var newPrice=value;
    var lots2=getEff(s2,'alot')||s2.lots;
    if(oldEff&&newPrice){calcFunds[accKey2]+=(newPrice-oldEff)*lots2*s2.lot;}
    else if(!oldEff&&newPrice){calcFunds[accKey2]+=newPrice*lots2*s2.lot;}
    else if(oldEff&&!newPrice){calcFunds[accKey2]-=oldEff*lots2*s2.lot;}
    saveCalcState();
    updateListRemaining();
  }
  pendingEdits[id][field]=value;
}

function updateCurPriceAndShow(el){var id=el.dataset.id;var price=parseFloat(el.value)||0;updateCurPrice(id,price);var span=el.parentNode.querySelector('span.mv');if(span){var lots=parseInt(el.dataset.lots)||0;var lot=parseInt(el.dataset.lot)||0;span.textContent=price?((price*lots*lot)/1e4).toFixed(2)+'万':'—';}updateListRemaining();}

function saveAllPending(){
  if(!hasPending()){ toast('没有需要保存的更改','info'); return; }
  let subs=JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  Object.keys(pendingEdits).forEach(id=>{
    const edits=pendingEdits[id];
    const oldSub=subs.find(s=>s.id===id);
    subs=subs.map(s=>s.id===id?{...s,...edits}:s);
    // 中签为0 → 删除
    if(edits.alot===0) subs=subs.filter(s=>s.id!==id);
  });
  localStorage.setItem('ipo_subs',JSON.stringify(subs));
  localStorage.setItem('ipo_subs_hidden',JSON.stringify([...hiddenSubs]));
  pendingEdits={};
  render(); toast('✅ 已保存','success');
}
function discardPending(){
  if(!hasPending()) return;
  if(!confirm('确定放弃未保存的更改？')) return;
  pendingEdits={};
  render(); toast('已放弃更改','info');
}

// 冻结资金：申购已扣款但中签结果未知（待开奖）
function getFrozenFunds(){
  const frozen={A:0,B:0,C:0};
  const subs=JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  subs.forEach(s=>{
    if(getEff(s,'sellPrice')) return;
    if(getEff(s,'alot')!=null) return; // 中签已知 → 划入持仓
    const k=s.account==='账户A'?'A':s.account==='账户B'?'B':s.account==='账户C'?'C':null;
    if(!k) return;
    frozen[k]+=s.frozen;
  });
  return frozen;
}
// 股票市值：已中签未卖出（持仓成本）
function getStockHolding(){
  const holding={A:0,B:0,C:0};
  const subs=JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  subs.forEach(s=>{
    if(getEff(s,'sellPrice')) return;
    const effAlot=getEff(s,'alot');
    if(!effAlot) return; // 未中签或无数据 → 不计入
    const k=s.account==='账户A'?'A':s.account==='账户B'?'B':s.account==='账户C'?'C':null;
    if(!k) return;
    holding[k]+=(s.curPrice?s.curPrice*effAlot*s.lot:effAlot*s.fee+COMMISSION);
  });
  return holding;
}
// 兼容旧调用：冻结+持仓合计（已卖出不计入）
function getSubsFrozen(){
  const f=getFrozenFunds(), h=getStockHolding();
  return {A:f.A+h.A, B:f.B+h.B, C:f.C+h.C};
}
// 获取各账户已卖出总回款（卖出价×中签手数×每手股数）
function getSoldProceeds(){
  const proceeds={A:0,B:0,C:0};
  const subs=JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  subs.forEach(s=>{
    const effSell=getEff(s,'sellPrice');
    if(!effSell) return;
    const k=s.account==='账户A'?'A':s.account==='账户B'?'B':s.account==='账户C'?'C':null;
    if(!k) return;
    const price=effSell;
    const lots=getEff(s,'alot')||s.lots;
    proceeds[k]+=price*lots*s.lot;
  });
  return proceeds;
}

function tiedLabel(frozen, holding, prefix){
  if(frozen<=0 && holding<=0) return '';
  var parts = [];
  if(frozen>0) parts.push('冻结'+(frozen/1e4).toFixed(2)+'万');
  if(holding>0) parts.push('持仓'+(holding/1e4).toFixed(2)+'万');
  return (prefix||'')+parts.join('+');
}

return html;
}

}

function onSubTierChange(){

}

function saveSub(){
  const code = document.getElementById('subStock').value;
  if(!code){ toast('请选择股票','error'); return; }
  const s = IPO_DATA.find(x=>x.code===code);
  const lots = parseInt(document.getElementById('subLots').value)||0;
  const amount = s.fee * lots;
  const frozen = amount + COMMISSION;
  const tierMap = {'1':'一手摸奖','5':'小甲5手','20':'小甲20手','50':'甲尾50手','0':'自定义'};
  const rec = {
    id: editId||Date.now().toString(),
    code, name:s.name, type:s.type,
    account: document.getElementById('subAccount').value,
    tier: tierMap[document.getElementById('subTier').value]||'自定义', lots,
    amount, frozen,
    subEnd: s.subEnd, listDate: s.listDate, fee:s.fee, lot:s.lot,
    sellPrice:null, sellDate:null
  };
  let subs = JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  if(editId){ const old=subs.find(x=>x.id===editId); if(old&&old.sellPrice){rec.sellPrice=old.sellPrice;rec.sellDate=old.sellDate;rec.actualLots=old.actualLots;} }
  if(editId) subs=subs.map(x=>x.id===editId?rec:x);
  else subs.push(rec);
  localStorage.setItem('ipo_subs',JSON.stringify(subs));
  editId=null;
  document.getElementById('subStock').value=''; document.getElementById('subLots').value=1;
  document.getElementById('subFee').value=''; document.getElementById('subTier').value='1';
  document.getElementById('editHint').textContent='';
  render(); toast('✅ 已保存','success');
}

      });

      html += `<div class="card" style="padding:10px;margin-bottom:6px;cursor:pointer" onclick="document.getElementById('bfStock').value='${s.code}';onBfStockChange();document.getElementById('bfLots').focus()">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">

            <span style="color:var(--gold);font-size:0.75em;margin-left:4px">${s.dec||''}</span>

          <div style="display:flex;gap:6px;align-items:center">

// 切换补录股票时，根据是否已上市调整表单提示
function onBfStockChange(){
  const code = document.getElementById('bfStock').value;
  const s = IPO_DATA.find(x => x.code === code);
  if (!s) return;
  const isListed = s.listDate <= today;
  const alotEl = document.getElementById('bfAlot');
  const sellEl = document.getElementById('bfSell');
  if (!isListed) {
    alotEl.placeholder = '尚未上市，暂不可填';
    alotEl.disabled = true;
    alotEl.style.opacity = '0.5';
    sellEl.placeholder = '尚未上市，暂不可填';
    sellEl.disabled = true;
    sellEl.style.opacity = '0.5';
  } else {
    alotEl.placeholder = '留空待定';
    alotEl.disabled = false;
    alotEl.style.opacity = '1';
    sellEl.placeholder = '留空待卖';
    sellEl.disabled = false;
    sellEl.style.opacity = '1';
  }
}

function saveBackfill(){
  const code = document.getElementById('bfStock').value;
  const account = document.getElementById('bfAccount').value;
  const lots = parseInt(document.getElementById('bfLots').value) || 1;
  const alotRaw = document.getElementById('bfAlot').value.trim();
  const alot = alotRaw !== '' ? parseInt(alotRaw) : undefined;
  const sellRaw = document.getElementById('bfSell').value.trim();
  const sellPrice = sellRaw !== '' ? parseFloat(sellRaw) : undefined;

  const s = IPO_DATA.find(x => x.code === code);
  if (!s) { toast('请选择股票', 'error'); return; }
  if (lots < 1) { toast('手数至少为1', 'error'); return; }

  let subs = JSON.parse(localStorage.getItem('ipo_subs') || '[]');

  // 检查是否已有同股票+同账户记录
  const existingIdx = subs.findIndex(x => x.code === code && x.account === account);
  if (existingIdx >= 0) {
    // 更新已有记录
    const r = subs[existingIdx];
    const oldFrozen=r.frozen, oldAlotR=r.alot;
    r.lots = lots;
    r.amount = s.fee * lots;
    r.frozen = s.fee * lots + COMMISSION;
    r.tier = lots + '手';
    if (alot !== undefined) {
      const oldCost=(oldAlotR!=null)?(oldAlotR===0?0:oldAlotR*s.fee+COMMISSION):oldFrozen;
      const newCost=alot===0?0:alot*s.fee+COMMISSION;
      const refund=oldCost-newCost;
      if(refund!==0){const ak=account==='账户A'?'A':account==='账户B'?'B':'C';calcFunds[ak]+=refund;saveCalcState();toast(account+' 中签退款 '+(refund>=0?'+':'')+Math.round(refund).toLocaleString()+' HKD','success');}
      r.alot = alot;
    }
    if (sellPrice !== undefined) { const oldPrice=r.sellPrice; r.sellPrice = sellPrice; r.sellDate = today; const accKey=account==='账户A'?'A':account==='账户B'?'B':'C'; const rLots=r.alot||r.lots; const proceeds=sellPrice*rLots*s.lot; if(oldPrice){const diff=(sellPrice-oldPrice)*rLots*s.lot;calcFunds[accKey]+=diff;toast(account+' 卖出价调整 '+(diff>0?'+':'')+Math.round(diff).toLocaleString()+' HKD','success');}else{calcFunds[accKey]+=proceeds;toast(account+' 回款 +'+Math.round(proceeds).toLocaleString()+' HKD 已入账','success');}saveCalcState(); }
    localStorage.setItem('ipo_subs', JSON.stringify(subs));
    // 已卖出 → 自动折叠；未卖出 → 展开以便继续编辑
    if (r.sellPrice) { hiddenSubs.add(r.id); }
    else { hiddenSubs.delete(r.id); }
    localStorage.setItem('ipo_subs_hidden', JSON.stringify([...hiddenSubs]));
    toast('✅ 已更新 ' + s.name + ' → ' + account, 'success');
  } else {
    // 新建记录
    const rec = {
      id: Date.now().toString(),
      code, name: s.name, type: s.type,
      account, tier: lots + '手', lots,
      amount: s.fee * lots,
      frozen: s.fee * lots + COMMISSION,
      subEnd: s.subEnd, listDate: s.listDate, fee: s.fee, lot: s.lot,
      sellPrice: sellPrice || null,
      sellDate: sellPrice ? today : null,
      alot: alot
    };
    subs.push(rec);
    // 中签退款：冻结金额 - 实际成本
    if(rec.alot!=null){const accKeyR=account==='账户A'?'A':account==='账户B'?'B':'C';const actualCost=rec.alot===0?0:rec.alot*s.fee+COMMISSION;const refund=rec.frozen-actualCost;calcFunds[accKeyR]+=refund;saveCalcState();toast(account+' 中签退款 '+(refund>=0?'+':'')+Math.round(refund).toLocaleString()+' HKD','success');}
    // 卖出回款
    if(rec.sellPrice){const accKeyN=account==='账户A'?'A':account==='账户B'?'B':'C';const rLotsN=rec.alot||lots;const proceedsN=rec.sellPrice*rLotsN*s.lot;calcFunds[accKeyN]+=proceedsN;saveCalcState();toast(account+' 回款 +'+Math.round(proceedsN).toLocaleString()+' HKD 已入账','success');}
    localStorage.setItem('ipo_subs', JSON.stringify(subs));
    // 已卖出 → 自动折叠
    if (rec.sellPrice) { hiddenSubs.add(rec.id); localStorage.setItem('ipo_subs_hidden', JSON.stringify([...hiddenSubs])); }
    toast('✅ 已补录 ' + s.name + ' → ' + account, 'success');
  }

  // 刷新弹窗内容
  showBackfill();
  // 同步刷新底层页面
  render();
}

function delSub(id){
  if(!confirm('确定删除？')) return;
  let subs = JSON.parse(localStorage.getItem('ipo_subs')||'[]');
  const rec = subs.find(x=>x.id===id);
  if(rec){
    // 记录已删除的股票+账户，防止选股页面重新保存时恢复
    let deleted = new Set(JSON.parse(localStorage.getItem('ipo_subs_deleted')||'[]'));
    deleted.add(rec.code+'_'+rec.account);
    localStorage.setItem('ipo_subs_deleted',JSON.stringify([...deleted]));
  }
  subs = subs.filter(x=>x.id!==id);
  localStorage.setItem('ipo_subs',JSON.stringify(subs));
  // 同时清理 pendingEdits
  delete pendingEdits[id];
  render(); toast('已删除','info');
}

function exportData(){
  const data = {
    subs: JSON.parse(localStorage.getItem('ipo_subs')||'[]'),
    webhook: JSON.parse(localStorage.getItem('ipo_webhook')||'{}'),
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='ipo_data_'+today+'.json'; a.click();
  toast('✅ 已导出','success');
}

function importData(event){
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(data.subs){
        // 已卖出记录自动折叠
        data.subs.forEach(s=>{ if(s.sellPrice) hiddenSubs.add(s.id); });
        localStorage.setItem('ipo_subs_hidden',JSON.stringify([...hiddenSubs]));
        localStorage.setItem('ipo_subs',JSON.stringify(data.subs));
      }
      if(data.webhook) localStorage.setItem('ipo_webhook',JSON.stringify(data.webhook));
      render(); toast('✅ 数据已导入','success');
    }catch(ex){ toast('❌ 文件格式错误','error'); }
  };
  reader.readAsText(file);
}

function renderDecisionReason(s){
  // 行业 AH 折价基准
  var sectorBenchmarks={
    '半导体':-40, '芯片':-40, '晶圆':-40, 'SiC':-40,
    'MLCC':-30, '元器件':-30, '电子':-35, '仪器':-35,
    '精密制造':-25, '制造':-25, '刀具':-25, 'PCB':-25, '钻针':-25,
    '化工':-45,
    '消费电子':-20, '代工':-20,
  };
  var bench=null;
  var sector='';
  var keys=Object.keys(sectorBenchmarks);
  for(var i=0;i<keys.length;i++){
    if((s.note||'').indexOf(keys[i])>=0 || (s.sh||'').indexOf(keys[i])>=0 || (s.name||'').indexOf(keys[i])>=0){
      bench=sectorBenchmarks[keys[i]]; sector=keys[i]; break;
    }
  }

  var items=[];
  // AH 股：折价对比
  if(s.type==='ah' && s.ahDisc){
    items.push('<span style="color:var(--muted)">AH折价</span> <b style="color:'+(parseFloat(s.ahDisc)<bench?'var(--red)':'var(--green)')+'">'+s.ahDisc+'</b>');
    if(bench!==null){
      var diff=parseFloat(s.ahDisc)-bench;
      items.push('<span style="color:var(--muted)">vs '+sector+'基准'+bench+'%</span> <b style="color:'+(diff<0?'var(--red)':'var(--green)')+'">'+(diff<0?'深':'浅')+Math.abs(diff)+'pp</b>');
    }
  }
  // 基石
  var csStr=(s.cs||1)+'星';
  if(s.cs>=5) csStr='<b style="color:var(--red)">'+csStr+'</b>';
  items.push('<span style="color:var(--muted)">基石</span> '+csStr+' '+(s.cornerstone||'无'));
  // 热度
  items.push('<span style="color:var(--muted)">热度</span> '+(s.hot||'—'));
  // 预计中签
  var curTiers=stockTiers[s.code]||{};
  var hasAny=false;
  ['A','B','C'].forEach(function(acc){ if(curTiers[acc]) hasAny=true; });
  if(hasAny && (s.margin||'').toString().length>0 && !isNaN(parseFloat(s.margin)) && parseFloat(s.margin)>0){
    var parts=[];
    ['A','B','C'].forEach(function(acc){
      var t=curTiers[acc];
      if(t){
        var r=getAllocRate(s.code, t.lots, s.fee);
        if(r>0) parts.push(acc+':'+(t.lots*r).toFixed(1)+'手');
      }
    });
    if(parts.length>0) items.push('<span style="color:var(--muted)">中签</span> '+parts.join(' '));
  }
  // 结论（决策结果）
  items.push('→ <b style="color:var(--gold);font-size:1.05em">'+(s.dec||'')+'</b>');

  return '<div style="font-size:0.72em;line-height:1.6">'+items.join(' &nbsp;<span style="color:var(--border)">|</span>&nbsp; ')+'</div>';
}

// 自动刷新：从本地服务器拉数据
async function refreshFromServer(){
  try{
    const resp = await fetch('data.json');
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    IPO_DATA = await resp.json();
    render();
    toast('✅ 数据已更新: '+IPO_DATA.length+'只新股','success');
  }catch(e){
    toast('❌ 数据更新失败，请稍后重试','error');
    console.error(e);
  }
}
function applyServerData(data){
  data.forEach(n=>{
    const i=IPO_DATA.findIndex(x=>x.code===n.code);
    if(i>=0) IPO_DATA[i]={...IPO_DATA[i],...n};
    else IPO_DATA.push(n);
  });
  IPO_DATA.sort((a,b)=>a.listDate.localeCompare(b.listDate));
  render();
}
// 页面加载时自动尝试连接服务器
function initAutoRefresh(){
  fetch('http://localhost:8766/api/ipo').then(r=>r.json()).then(j=>{
    if(j.success&&j.data&&j.data.length>0){
      applyServerData(j.data);
      document.getElementById('serverStatus')&&(document.getElementById('serverStatus').textContent='🟢 在线 · '+j.updated||'');
    }
  }).catch(()=>{});
}
setTimeout(initAutoRefresh,500);

function addSub(code){
  const s = IPO_DATA.find(x=>x.code===code); if(!s) return;

  });

// A+H 实时价格数据
const AH_FX = 0.92; // 1 HKD ≈ 0.92 CNY
let ahLiveData = {}; // {ahCode: {price, name, time}}

let ahFetching = false;
function fetchAHPrices(){
  if(ahFetching) return;
  const ahStocks = IPO_DATA.filter(s=>s.type==='ah'&&s.ahCode);
  if(!ahStocks.length) return;
  ahFetching = true;
  let pending = ahStocks.length;
  ahStocks.forEach(s=>{
    fetch('http://localhost:8766/api/ah_price?code='+s.ahCode)
    .then(r=>r.json()).then(d=>{
      if(d&&d.price){
        ahLiveData[s.ahCode] = d;
        const hPrice = parseHPrice(s.price);
        const hCny = hPrice * AH_FX;
        const disc = ((hCny - d.price) / d.price * 100).toFixed(1);
        s.ahPrice = '¥'+d.price.toFixed(2);
        s.ahDisc = (disc>0?'+':'')+disc+'%';
      }
    }).catch(()=>{}).finally(()=>{
      pending--;
      if(pending===0){ ahFetching = false; if(currentTab==='list'){ var app=document.getElementById('app'); app.innerHTML=renderListTab(); updateTabBar(); } }
    });
  });
}
function parseHPrice(priceStr){
  // "30.00-32.30" → 32.30, "≤45.98" → 45.98, "380.00" → 380.00
  const m = priceStr.match(/[\d.]+$/);
  return m ? parseFloat(m[0]) : 0;
}

function closeModal(){ document.getElementById('modalOverlay').style.display='none'; }
function toast(msg,type){
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`; el.textContent = msg;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},2000);
}

// 页面加载时自动从本地JSON文件拉取最新数据
(function(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','ipo_data_auto.json?t='+Date.now(),true);
  xhr.onload=function(){
    if(xhr.status===200){
      try{
        var d=JSON.parse(xhr.responseText);
        if(Array.isArray(d)&&d.length>0){
          d.forEach(function(n){
            var i=IPO_DATA.findIndex(function(x){return x.code===n.code;});
            if(i>=0){
              // 浅合并：保留 HTML 内嵌的 allLots/jiaTiers 等招股书原始数据，不被 JSON 覆盖丢失
              var keep=['allLots','jiaTiers','ahDisc','ahPrice'];
              var existing=IPO_DATA[i];
              IPO_DATA[i]=n;
              keep.forEach(function(k){ if(existing[k]!==undefined && n[k]===undefined) IPO_DATA[i][k]=existing[k]; });
            } else {
              IPO_DATA.push(n);
            }
          });
          IPO_DATA.sort(function(a,b){return a.listDate.localeCompare(b.listDate);});
          if(currentTab==='list') render();
        }
      }catch(e){}
    }
  };
  xhr.send();
})();

// 全局：输入框中按方向键等同于回车（触发 onchange）
document.addEventListener('keydown', function(e){
  if(!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;
  if(e.target.tagName!=='INPUT') return;
  if(e.target.readOnly) return;
  if(e.target.type==='date') return; // 日期输入保留原生方向键行为
  e.preventDefault();
  e.target.blur();
});
