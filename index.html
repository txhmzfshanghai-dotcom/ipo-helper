<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>港新股打新计算器</title>
<style>
:root{--red:#e74c3c;--green:#27ae60;--orange:#f39c12;--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--gold:#f0c040}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang HK','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;padding-bottom:160px}
.app{max-width:800px;margin:0 auto;padding:12px}
h1{font-size:1.15em;color:#fff;text-align:center;margin:8px 0 16px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card h3{color:#fff;font-size:.9em;margin-bottom:10px}

/* Fund inputs */
.fund-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.fund-item label{display:block;color:var(--muted);font-size:.72em;margin-bottom:3px}
.fund-item input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:.85em}
.fund-item input:focus{outline:none;border-color:var(--accent)}

/* Conflict bar */
.conflict-bar{background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:.76em;color:var(--orange)}

/* Filter */
.filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;font-size:.76em;color:var(--muted);cursor:pointer;background:none;transition:all .15s}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.1)}

/* Stock card */
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.stock-card.sel{border-color:var(--accent)}
.stock-hdr{display:flex;align-items:center;padding:12px;gap:8px;cursor:pointer}
.stock-hdr .chk{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6em;color:#fff}
.stock-hdr .chk.on{background:var(--accent);border-color:var(--accent)}
.stock-info{flex:1;min-width:0}
.stock-info .n{color:#fff;font-weight:600;font-size:.85em}
.stock-info .n code{color:var(--muted);font-weight:400;font-size:.85em}
.stock-info .m{color:var(--muted);font-size:.7em;margin-top:2px}
.stock-info .m .deadline{color:var(--red)}
.stock-hdr .arrow{color:var(--muted);font-size:.7em;flex-shrink:0}
.stock-hdr .detail{color:var(--muted);font-size:.9em;padding:2px 8px;flex-shrink:0;cursor:pointer}
.stock-tags{display:flex;gap:6px;flex-wrap:wrap;padding:0 12px 10px}
.tag{padding:2px 8px;border-radius:6px;font-size:.65em;color:var(--muted);background:rgba(139,148,158,.1)}
.tag-dec{color:var(--accent);background:rgba(88,166,255,.1)}
.tag-note{color:var(--orange);background:rgba(243,156,18,.1);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Tier table */
.tier-wrap{border-top:1px solid var(--border);padding:6px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tier-table{min-width:620px;font-size:.72em}
.tier-row{display:flex}
.tier-hdr{background:#21262d}
.tier-hdr .tier-cell{color:#fff;font-weight:600;padding:8px 6px;font-size:.75em}
.tier-cell{padding:8px 6px;border-bottom:1px solid rgba(48,54,61,.4)}
.tier-cell.lots{width:70px;text-align:right}
.tier-cell.amt{width:95px;text-align:right}
.tier-cell.cash{width:85px;text-align:right}
.tier-cell.pick{width:90px;text-align:center}
.tier-cell .remain{display:block;font-size:.7em;color:var(--muted);font-weight:400}
.pick-btn{padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-size:.75em;color:var(--muted);cursor:pointer;background:none;transition:all .15s;white-space:nowrap}
.pick-btn:hover{border-color:var(--accent);color:var(--accent)}
.pick-btn.done{background:rgba(88,166,255,.2);border-color:var(--accent);color:var(--accent)}
.pick-btn.over{color:var(--red);border-color:rgba(231,76,60,.4);background:rgba(231,76,60,.1);cursor:not-allowed}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--border);padding:14px 16px;z-index:50}
.bottom-bar .totals{display:flex;gap:8px}
.bottom-bar .t{flex:1;text-align:center;padding:10px;border-radius:8px;background:rgba(88,166,255,.06)}
.bottom-bar .t.over{background:rgba(231,76,60,.1)}
.bottom-bar .t .v{font-size:1.1em;font-weight:700;color:var(--accent)}
.bottom-bar .t.over .v{color:var(--red)}
.bottom-bar .t .l{font-size:.68em;color:var(--muted)}
.bottom-bar .warn{text-align:center;color:var(--red);font-size:.75em;margin-top:8px;font-weight:600}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal .close{position:absolute;top:10px;right:14px;font-size:1.2em;color:var(--muted);cursor:pointer;background:none;border:none}
.modal h3{color:#fff;font-size:1em;margin-bottom:12px;padding-right:30px}
.modal .row{display:flex;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.3);font-size:.78em}
.modal .row .dl{width:80px;color:var(--muted);flex-shrink:0}
.modal .row .dv{flex:1;color:var(--text)}

/* Reset btn */
.reset-bar{text-align:center;margin-top:8px}
.reset-btn{padding:6px 16px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.7em;cursor:pointer}

.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.85em}

@media(max-width:480px){
  .fund-row{grid-template-columns:1fr 1fr 1fr}
  .tier-table{min-width:520px;font-size:.68em}
  .tier-cell{padding:6px 4px}
  .tier-cell.lots{width:55px}.tier-cell.amt{width:75px}.tier-cell.cash{width:65px}.tier-cell.pick{width:70px}
  .pick-btn{padding:3px 8px;font-size:.7em}
}
</style>
</head>

const COMMISSION = 50;
const TODAY = '2026-06-30';

// ==================== STATE (persisted via localStorage) ====================
function loadState(){
  try{
    var s = JSON.parse(localStorage.getItem('ipo_calc_state'));
    return s || {funds:{A:500000,B:500000,C:500000},tiers:{},sel:[],filter:'all'};
  }catch(e){return {funds:{A:500000,B:500000,C:500000},tiers:{},sel:[],filter:'all'};}
}
function saveState(st){ localStorage.setItem('ipo_calc_state', JSON.stringify(st)); }

// ==================== RENDER ====================
function render(){
  var st = loadState();
  var funds = st.funds, tiers = st.tiers, selCodes = st.sel, filter = st.filter;

  // Compute used per account (本金 = (申购金额+佣金)/10)
  var used = {A:0,B:0,C:0};
  selCodes.forEach(function(code){
    ['A','B','C'].forEach(function(acc){
      var t = tiers[code] && tiers[code][acc];
      if(t) used[acc] += (t.amt + COMMISSION) / 10;
    });
  });

  // Filter stocks
  var stocks = IPO_DATA.slice();
  if(filter==='ah') stocks = stocks.filter(function(s){return s.type==='ah';});
  else if(filter==='inst') stocks = stocks.filter(function(s){return s.type==='inst';});
  else if(filter==='zhuang') stocks = stocks.filter(function(s){return s.type==='zhuang';});
  else if(filter==='subbing') stocks = stocks.filter(function(s){return s.subEnd>=TODAY;});

  // Build HTML
  var html = '';

  // Title
  html += '<h1>📊 港新股打新计算器</h1>';

  // Fund inputs
  html += '<div class="card"><h3>💰 账户资金 (10x杠杆，显示为所需本金)</h3>';
  html += '<div class="fund-row">';
  ['A','B','C'].forEach(function(acc){
    html += '<div class="fund-item"><label>账户'+acc+' (HKD)</label>';
    html += '<input type="number" id="fund'+acc+'" value="'+funds[acc]+'" onchange="onFundChange(\''+acc+'\',this.value)" placeholder="500000">';
    html += '</div>';
  });
  html += '</div></div>';

  // Conflict bar
  var conflict = buildConflict();
  if(conflict) html += '<div class="conflict-bar">'+conflict+'</div>';

  // Filter bar
  html += '<div class="filter-bar">';
  var filters = [
    {k:'all',l:'全部'},{k:'ah',l:'🔷 A+H'},{k:'inst',l:'⭐ 机构'},{k:'zhuang',l:'🦄 庄票'},{k:'subbing',l:'🟢 招股中'}
  ];
  filters.forEach(function(f){
    html += '<button class="filter-btn'+(filter===f.k?' active':'')+'" onclick="onFilter(\''+f.k+'\')">'+f.l+'</button>';
  });
  html += '</div>';

  // Stock list
  stocks.forEach(function(s){
    var sel = selCodes.indexOf(s.code)>=0;
    var stockTier = tiers[s.code] || {};

    // Remaining funds for this stock (remaining = total - used + current_stock_already_used)
    var curUsed = {A:0,B:0,C:0};
    ['A','B','C'].forEach(function(acc){
      var t = stockTier[acc];
      if(t) curUsed[acc] = (t.amt + COMMISSION) / 10;
    });
    var remA = (funds.A - used.A + curUsed.A)/1e4;
    var remB = (funds.B - used.B + curUsed.B)/1e4;
    var remC = (funds.C - used.C + curUsed.C)/1e4;

    // Type icon
    var typeIcon = s.type==='ah'?'🔷':s.type==='inst'?'⭐':s.type==='zhuang'?'🦄':'';

    html += '<div class="stock-card'+(sel?' sel':'')+'">';
    // Header
    html += '<div class="stock-hdr" onclick="toggleStock(\''+s.code+'\')">';
    html += '<div class="chk'+(sel?' on':'')+'">'+(sel?'✓':'')+'</div>';
    html += '<div class="stock-info">';
    html += '<div class="n">'+typeIcon+' '+s.name+' <code>'+s.code+'</code></div>';
    html += '<div class="m"><span style="background:rgba(88,166,255,.15);color:var(--accent);padding:1px 6px;border-radius:4px;font-size:.7em">'+(s.mech||'—')+'</span> · '+s.lot+'股/手 · '+s.fee.toLocaleString()+' HKD · <span class="deadline">⏰ '+s.subEnd+'</span></div>';
    html += '</div>';
    html += '<span class="detail" onclick="event.stopPropagation();showDetail(\''+s.code+'\')">ℹ️</span>';
    html += '<span class="arrow">'+(sel?'▼':'▶')+'</span>';
    html += '</div>';

    // Tags
    html += '<div class="stock-tags">';
    html += '<span class="tag">'+(s.cornerstone||'无基石')+'</span>';
    html += '<span class="tag">'+(s.hot||'')+'</span>';
    html += '<span class="tag tag-dec">'+(s.dec||'')+'</span>';
    if(s.note) html += '<span class="tag tag-note" title="'+s.note+'">'+s.note+'</span>';
    html += '</div>';

    // Tier table (expanded)
    if(sel && s.allLots && s.allLots.length){
      html += '<div class="tier-wrap"><div class="tier-table">';
      // Header
      html += '<div class="tier-row tier-hdr">';
      html += '<div class="tier-cell lots">手数</div>';
      html += '<div class="tier-cell amt">申购金额</div>';
      html += '<div class="tier-cell cash">需本金</div>';
      ['A','B','C'].forEach(function(acc){
        html += '<div class="tier-cell pick">'+acc+'<span class="remain">余'+((acc==='A'?remA:acc==='B'?remB:remC).toFixed(0))+'万</span></div>';
      });
      html += '</div>';
      // Rows
      s.allLots.forEach(function(lot){
        var cash = (lot.amt + COMMISSION) / 10;
        var cashWan = cash/1e4;
        var picks = {};
        ['A','B','C'].forEach(function(acc){
          picks[acc] = !!(stockTier[acc] && stockTier[acc].lots === lot.lots);
        });
        var overs = {};
        ['A','B','C'].forEach(function(acc){
          var accRem = acc==='A'?remA:acc==='B'?remB:remC;
          overs[acc] = cashWan > accRem && !picks[acc];
        });
        html += '<div class="tier-row">';
        html += '<div class="tier-cell lots">'+lot.lots.toLocaleString()+'</div>';
        html += '<div class="tier-cell amt">'+(lot.amt/1e4).toFixed(0)+'万</div>';
        html += '<div class="tier-cell cash">'+cashWan.toFixed(1)+'万</div>';
        ['A','B','C'].forEach(function(acc){
          var cls = 'pick-btn';
          if(picks[acc]) cls += ' done';
          if(overs[acc]) cls += ' over';
          var txt = picks[acc] ? '✓' : (overs[acc] ? '超' : '选');
          html += '<div class="tier-cell pick"><button class="'+cls+'" onclick="event.stopPropagation();pickTier(\''+s.code+'\',\''+acc+'\','+lot.lots+','+lot.amt+')"'+((overs[acc]&&!picks[acc])?' disabled':'')+'>'+txt+'</button></div>';
        });
        html += '</div>';
      });
      html += '</div></div>';
    }

    html += '</div>'; // stock-card
  });

  if(!stocks.length) html += '<div class="empty">没有匹配的股票</div>';

  // Reset
  html += '<div class="reset-bar"><button class="reset-btn" onclick="resetAll()">🔄 清除全部选择</button></div>';

  document.getElementById('app').innerHTML = html;

  // Bottom bar
  renderBottom(used, funds);
}

function renderBottom(used, funds){
  var ta = used.A/1e4, tb = used.B/1e4, tc = used.C/1e4;
  var overA = used.A > funds.A, overB = used.B > funds.B, overC = used.C > funds.C;
  var anyOver = overA || overB || overC;

  // Create or update bottom bar
  var bar = document.getElementById('bottomBar');
  if(!bar){
    bar = document.createElement('div');
    bar.id = 'bottomBar';
    bar.className = 'bottom-bar';
    document.body.appendChild(bar);
  }
  var html = '<div class="totals">';
  ['A','B','C'].forEach(function(acc){
    var over = acc==='A'?overA:acc==='B'?overB:overC;
    var val = acc==='A'?ta:acc==='B'?tb:tc;
    html += '<div class="t'+(over?' over':'')+'">';
    html += '<div class="v">'+acc+' '+val.toFixed(1)+'万</div>';
    html += '<div class="l">本金'+(funds[acc]/1e4).toFixed(0)+'万</div>';
    html += '</div>';
  });
  html += '</div>';
  if(anyOver) html += '<div class="warn">⚠️ 超出本金上限</div>';
  bar.innerHTML = html;
}

// ==================== ACTIONS ====================
function onFundChange(acc, val){
  var st = loadState();
  st.funds[acc] = parseFloat(val) || 0;
  saveState(st);
  render();
}

function onFilter(k){
  var st = loadState();
  st.filter = k;
  saveState(st);
  render();
}

function toggleStock(code){
  var st = loadState();
  var idx = st.sel.indexOf(code);
  if(idx>=0){ st.sel.splice(idx,1); delete st.tiers[code]; }
  else st.sel.push(code);
  saveState(st);
  render();
}

function pickTier(code, acc, lots, amt){
  var st = loadState();
  if(!st.tiers[code]) st.tiers[code] = {};
  var cur = st.tiers[code][acc];
  if(cur && cur.lots === lots){ delete st.tiers[code][acc]; }
  else { st.tiers[code][acc] = {lots:lots, amt:amt}; }
  if(st.sel.indexOf(code)<0) st.sel.push(code);
  saveState(st);
  render();
}

function showDetail(code){
  var s = IPO_DATA.find(function(x){return x.code===code;});
  if(!s) return;
  var html = '<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">';
  html += '<button class="close" onclick="closeModal()">✕</button>';
  html += '<h3>'+s.name+' <code style="color:var(--muted)">'+s.code+'</code></h3>';
  var rows = [
    ['招股期', s.subStart+' → '+s.subEnd+' · 上市 '+s.listDate],
    ['定价', (s.price||'')+' · '+s.lot+'股/手 · 入场费 '+(s.fee||'').toLocaleString()],
    ['基石', s.cornerstone||'无'],
    ['保荐人', s.sponsor||'—'],
    ['机制', (s.mech||'—')+' · 公开手数 '+(s.pubLots||'—')+' · 计息 '+(s.interest||'?')+'日'],
    ['市值', s.mcap||'—'],
    ['预期涨幅', s.gain||'—'],
    ['建议', s.dec||'—']
  ];
  if(s.note) rows.push(['备注', s.note]);
  if(s.ahDisc) rows.push(['A/H折价', (s.ahPrice||'')+' · H折让 '+(s.ahDisc||'')]);
  rows.forEach(function(r){
    html += '<div class="row"><span class="dl">'+r[0]+'</span><span class="dv">'+r[1]+'</span></div>';
  });
  html += '</div></div>';
  document.getElementById('modalCtn').innerHTML = html;
}

function closeModal(){ document.getElementById('modalCtn').innerHTML = ''; }

function resetAll(){
  if(confirm('确定清除全部选择？')){ localStorage.removeItem('ipo_calc_state'); render(); }
}

// ==================== CONFLICT ====================
function buildConflict(){
  var active = IPO_DATA.filter(function(s){return s.subEnd>=TODAY;});
  var byEnd = {};
  active.forEach(function(s){
    if(!byEnd[s.subEnd]) byEnd[s.subEnd]=[];
    byEnd[s.subEnd].push(s);
  });
  var dates = Object.keys(byEnd).sort();
  if(dates.length<=1) return '';

  var cur = {dates:[dates[0]],stocks:byEnd[dates[0]].slice()};
  var groups = [];
  for(var i=1;i<dates.length;i++){
    var d = dates[i];
    var lastD = cur.dates[cur.dates.length-1];
    if((new Date(d)-new Date(lastD))/864e5 <= 2){
      cur.dates.push(d);
      cur.stocks = cur.stocks.concat(byEnd[d]);
    } else {
      if(cur.stocks.length>=2) groups.push(cur);
      cur = {dates:[d],stocks:byEnd[d].slice()};
    }
  }
  if(cur.stocks.length>=2) groups.push(cur);
  if(!groups.length) return '';

  var g = groups[0];
  var ds = g.dates.map(function(d){return d.slice(5);}).join('和');
  var lastEnd = new Date(g.dates[g.dates.length-1]);
  var release = new Date(lastEnd.getTime()+864e5).toISOString().slice(5,10);
  var nextBatch = dates.find(function(d){return new Date(d)-lastEnd>=864e5*2;});
  var extra = nextBatch ? ' · '+release+'解冻后可复用'+nextBatch.slice(5)+'截止批次' : '';
  return '⚠️ '+g.stocks.length+'只新股·截止日相邻('+ds+')·资金冲突'+extra;
}

// ==================== INIT ====================
render();
</script>
